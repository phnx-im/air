[graph]
targets = [
    "aarch64-apple-darwin",
    "aarch64-apple-ios",
    "aarch64-linux-android",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "x86_64-windows-msvc",
]
all-features = false
no-default-features = false

[bans]
multiple-versions = "allow"

[advisories]
unsound = "all"
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "no fix yet available; the crate is not used by us" },
    { id = "RUSTSEC-2024-0436", reason = "no fix yet available" },
    { id = "RUSTSEC-2026-0002", reason = "no fix yet available" },
    { id = "RUSTSEC-2026-0097", reason = "rand 0.8.5 pinned by third-party deps; no 0.8.x patch available" },
    # <https://github.com/Smithay/wayland-rs/pull/938>
    { id = "RUSTSEC-2026-0194", reason = "waiting for wayland-scanner to be updated and used upstream" },
    { id = "RUSTSEC-2026-0195", reason = "waiting for wayland-scanner to be updated and used upstream" },
]

[licenses]
# List of explicitly allowed licenses
# See https://spdx.org/licenses/ for list of possible licenses
# [possible values: any SPDX 3.11 short identifier (+ optional exception)].
allow = [
    "Apache-2.0 WITH LLVM-exception",
    "Apache-2.0",
    "BlueOak-1.0.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8
exceptions = [
    { allow = [
        "AGPL-3.0-or-later",
    ], crate = "mls-assist" },
    { allow = [
        "AGPL-3.0-or-later",
    ], crate = "mimi_content" },
    { allow = [
        "AGPL-3.0-or-later",
    ], crate = "mimi-room-policy" },
    { allow = [
        "AGPL-3.0-or-later",
    ], crate = "apqmls" },
]

[licenses.private]
ignore = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    # unreleased post-quantum and virtual-clients features of openmls after the 0.8.1 release
    "https://github.com/openmls/openmls",
    "https://github.com/RustCrypto/RSA",
]

[sources.allow-org]
github = ["phnx-im"]
