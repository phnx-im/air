name: Build Android app

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: ["main"]
  merge_group:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  SQLX_OFFLINE: true

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch all commit metadata (build number is derived from number of commits)
          fetch-depth: 0
          # Don't download historical file contents (blobs)
          filter: blob:none

      - name: Setup build environment
        uses: ./.github/actions/setup-buildenv
        with:
          fastlane: true
          jdk: true
          cargo-binstall-tools: cargo-ndk

      - name: Build Android app
        working-directory: app
        run: bundle exec fastlane android beta_android --verbose

      - name: Upload Android app APK
        uses: actions/upload-artifact@v4
        with:
          name: air-android
          path: app/build/app/outputs/flutter-apk/app-release.apk
