name: Build Linux app

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: ["main"]
  merge_group:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  SQLX_OFFLINE: true

jobs:
  linux-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Fetch all commit metadata (build number is derived from number of commits)
          fetch-depth: 0
          # Don't download historical file contents (blobs)
          filter: blob:none

      - run: git lfs install && git lfs pull

      - uses: extractions/setup-just@v2
      - run: just install-fvm
      - run: echo /home/runner/fvm/bin >> $GITHUB_PATH

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build gtk+-3.0 gtk+-3.0-dev glib-2.0-dev gio-2.0-dev

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build Linux app
        run: cd app && fvm flutter build linux -v --build-number=$(git rev-list --count HEAD)
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

      - name: Upload Linux app
        uses: actions/upload-artifact@v4
        with:
          name: linux-app-x64
          path: app/build/linux/x64/release/bundle
