name: Build Linux app

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  merge_group:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  SQLX_OFFLINE: true
  RUSTFLAGS: "-D warnings"
  # Unfortunately, flutter doesn't support flavors on Linux, so we do with env variables and CMake
  APP_FLAVOR: "${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}"

jobs:
  linux-build:
    runs-on: ubuntu-latest
    outputs:
      build-number: ${{ steps.setup-buildenv.outputs.build-number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Fetch all commit metadata (build number is derived from number of commits)
          fetch-depth: 0
          # Don't download historical file contents (blobs)
          filter: blob:none

      - id: setup-buildenv
        name: Setup build environment
        uses: ./.github/actions/setup-buildenv

      - name: Build app
        working-directory: app
        run: flutter build linux -v --build-number=${{ steps.setup-buildenv.outputs.build-number }}

      - name: Upload app bundle
        uses: actions/upload-artifact@v6
        with:
          name: linux-x64-app
          path: app/build/linux/x64/release/bundle

  linux-publish:
    environment: linux-packages

    needs: linux-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download app bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-x64-app
          path: app/build/linux/x64/release/bundle

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install awscli
        uses: unfor19/install-aws-cli-action@v1

      - name: Install dependencies
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update && sudo apt-get install -y apt-utils createrepo-c gpg nfpm rpm

      - name: Build packages
        run: RELEASE=${{ needs.linux-build.outputs.build-number }} just build-deb build-rpm

      - name: Import GPG key and unlock it in the agent
        env:
          GPG_KEY_ID: ${{ vars.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          cat >> ~/.gnupg/gpg-agent.conf <<'EOF'
          allow-loopback-pinentry
          allow-preset-passphrase
          default-cache-ttl 7200
          max-cache-ttl 7200
          EOF
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpg-connect-agent reloadagent /bye
          echo "$GPG_SIGNING_KEY" | gpg --batch --import

          # Preload the passphrase into gpg-agent so subsequent signing calls
          # (including gpg invocations spawned by rpm --addsign) don't prompt.
          preset_bin="$(gpgconf --list-dirs libexecdir)/gpg-preset-passphrase"
          while IFS= read -r keygrip; do
            [ -n "$keygrip" ] || continue
            "$preset_bin" --preset --passphrase "$GPG_PASSPHRASE" "$keygrip"
          done < <(gpg --batch --with-colons --with-keygrip --list-secret-keys "$GPG_KEY_ID" \
            | awk -F: '/^grp:/ {print $10}')

      - name: Upload packages
        working-directory: app/linux
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GPG_KEY_ID: ${{ vars.GPG_KEY_ID }}
          REPOSITORY_BASE_URL: ${{ vars.REPOSITORY_BASE_URL }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
        run: |
          ./publish-packages.sh air-*.rpm
          ./publish-packages.sh air-*.deb
