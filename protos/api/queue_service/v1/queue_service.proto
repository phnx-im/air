syntax = "proto3";

package queue_service.v1;

import "common/v1/common.proto";
import "delivery_service/v1/delivery_service.proto";

service QueueService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);

  rpc CreateClient(CreateClientRequest) returns (CreateClientResponse);
  rpc UpdateClient(UpdateClientRequest) returns (UpdateClientResponse);
  rpc DeleteClient(DeleteClientRequest) returns (DeleteClientResponse);

  rpc PublishKeyPackages(PublishKeyPackagesRequest) returns (PublishKeyPackagesResponse);

  // Stage a batch of key package (traditional and/or APQ) identified by
  // (user_id, epoch_id, leaf_index, generation).
  //
  // The key packages are staged on the server but are not yet visible to other
  // users. The batch is promoted to live by the DS when the group operation
  // committing the batch is successfully committed and distributed in the
  // emulation group of the virtual client.
  //
  // The operation is idempotent when the batch is exactly the same as the
  // staged batch (the order of key packages *matters*).
  //
  // ## Full Protocol
  //
  // ```
  //  Emulator A           QS                DS              Emulator B
  //     │                 │                 │                 │
  //     │ Stage(          │                 │                 │
  //     │ client_id,      │                 │                 │
  //     │ epoch_id,       │                 │                 │
  //     │ leaf_index,     │                 │                 │
  //     │ generation, KPs)│                 │                 │
  //     │ ───────────────►│ store staging   │                 │
  //     │                 │ row             │                 │
  //     │ GroupOperation  │                 │                 │
  //     │ (commit with    │                 │                 │
  //     │ KeyPackageUpload│                 │                 │
  //     │ in SafeAAD)     │                 │                 │
  //     │ ─────────────────────────────────►│ validate,       │
  //     │                 │                 │ totally-order,  │
  //     │                 │                 │ extract SafeAAD │
  //     │                 │ DsFanOutMsg     │ fan out to      │
  //     │                 │ with            │ emulation-      │
  //     │                 │ QsVirtualClient │ group members   │
  //     │                 │ Hint            │                 │
  //     │                 │◄────────────────│                 │
  //     │                 │ promote         │                 │
  //     │                 │ staging:        │                 │
  //     │                 │ live KPs ←      │                 │
  //     │                 │ staged KPs      │                 │
  //     │                 │ delete row      │                 │
  //     │                 │ enqueue commit  │                 │
  //     │                 │ ─────────────────────────────────►│ decrypt
  //     │                 │                 │                 │ commit;
  //     │                 │                 │                 │ derive KPs
  //     │                 │                 │                 │ from
  //     │                 │                 │                 │ (epoch_id,
  //     │                 │                 │                 │ leaf_index,
  //     │                 │                 │                 │ generation);
  //     │                 │                 │                 │ verify QS
  // ```
  rpc StageKeyPackages(StageKeyPackagesRequest) returns (StageKeyPackagesResponse);

  rpc KeyPackage(KeyPackageRequest) returns (KeyPackageResponse);

  rpc PublishApqKeyPackages(PublishApqKeyPackagesRequest) returns (PublishApqKeyPackagesResponse);
  rpc ApqKeyPackage(ApqKeyPackageRequest) returns (ApqKeyPackageResponse);

  rpc QsEncryptionKey(QsEncryptionKeyRequest) returns (QsEncryptionKeyResponse);

  rpc Listen(stream ListenRequest) returns (stream ListenResponse);
}

// common

message QsUserId {
  common.v1.Uuid value = 1;
}

message QsClientId {
  common.v1.Uuid value = 1;
}

// create user

message CreateUserRequest {
  common.v1.ClientMetadata client_metadata = 7;
  QsUserVerifyingKey user_record_auth_key = 1;
  FriendshipToken friendship_token = 2;
  QsClientVerifyingKey client_record_auth_key = 3;
  common.v1.RatchetEncryptionKey queue_encryption_key = 4;
  optional EncryptedPushToken encrypted_push_token = 5;
  common.v1.RatchetSecret initial_ratched_secret = 6;
}

message QsUserVerifyingKey {
  bytes bytes = 1;
}

message FriendshipToken {
  bytes bytes = 1;
}

message QsClientVerifyingKey {
  bytes bytes = 1;
}

message EncryptedPushToken {
  common.v1.Ciphertext ciphertext = 1;
}

message CreateUserResponse {
  QsUserId user_id = 1;
  QsClientId client_id = 2;
}

// update user

message UpdateUserRequest {
  common.v1.ClientMetadata client_metadata = 4;
  QsUserId sender = 1;
  QsUserVerifyingKey user_record_auth_key = 2;
  FriendshipToken friendship_token = 3;

  UpdateUserPayload payload = 5;
  common.v1.Signature signature = 6;
}

message UpdateUserPayload {
  common.v1.ClientMetadata client_metadata = 1;
  QsUserId sender = 2;
  QsUserVerifyingKey user_record_auth_key = 3;
  FriendshipToken friendship_token = 4;
}

message UpdateUserResponse {}

// delete user

message DeleteUserRequest {
  common.v1.ClientMetadata client_metadata = 2;
  QsUserId sender = 1;
  // TODO: don't we need user_record_auth_key here?

  DeleteUserPayload payload = 3;
  common.v1.Signature signature = 4;
}

message DeleteUserPayload {
  common.v1.ClientMetadata client_metadata = 1;
  QsUserId sender = 2;
}

message DeleteUserResponse {}

// create client

message CreateClientRequest {
  common.v1.ClientMetadata client_metadata = 6;
  QsUserId sender = 1;
  QsClientVerifyingKey client_record_auth_key = 2;
  common.v1.RatchetEncryptionKey queue_encryption_key = 3;
  optional EncryptedPushToken encrypted_push_token = 4;
  common.v1.RatchetSecret initial_ratched_secret = 5;

  CreateClientPayload payload = 7;
  common.v1.Signature signature = 8;
}

message CreateClientPayload {
  common.v1.ClientMetadata client_metadata = 1;
  QsUserId sender = 2;
  QsClientVerifyingKey client_record_auth_key = 3;
  common.v1.RatchetEncryptionKey queue_encryption_key = 4;
  optional EncryptedPushToken encrypted_push_token = 5;
  common.v1.RatchetSecret initial_ratched_secret = 6;
}

message CreateClientResponse {
  QsClientId client_id = 1;
}

// update client

message UpdateClientRequest {
  common.v1.ClientMetadata client_metadata = 5;
  QsClientId sender = 1;
  QsClientVerifyingKey client_record_auth_key = 2;
  common.v1.RatchetEncryptionKey queue_encryption_key = 3;
  optional EncryptedPushToken encrypted_push_token = 4;

  UpdateClientPayload payload = 6;
  common.v1.Signature signature = 7;
}

message UpdateClientPayload {
  common.v1.ClientMetadata client_metadata = 1;
  QsClientId sender = 2;
  QsClientVerifyingKey client_record_auth_key = 3;
  common.v1.RatchetEncryptionKey queue_encryption_key = 4;
  optional EncryptedPushToken encrypted_push_token = 5;
}

message UpdateClientResponse {}

// delete client

message DeleteClientRequest {
  common.v1.ClientMetadata client_metadata = 2;
  QsClientId sender = 1;

  DeleteClientPayload payload = 3;
  common.v1.Signature signature = 4;
}

message DeleteClientPayload {
  common.v1.ClientMetadata client_metadata = 1;
  QsClientId sender = 2;
}

message DeleteClientResponse {}

// publish key packages

message PublishKeyPackagesRequest {
  common.v1.ClientMetadata client_metadata = 3;
  QsClientId client_id = 1;
  repeated KeyPackage key_packages = 2;

  PublishKeyPackagesPayload payload = 4;
  common.v1.Signature signature = 5;
}

message PublishKeyPackagesPayload {
  common.v1.ClientMetadata client_metadata = 1;
  QsClientId client_id = 2;
  repeated KeyPackage key_packages = 3;
}

message KeyPackage {
  bytes tls = 1;
}

message PublishKeyPackagesResponse {}

// stage key packages

message StageKeyPackagesRequest {
  StageKeyPackagesPayload payload = 1;
  common.v1.Signature signature = 2;
}

message StageKeyPackagesPayload {
  common.v1.ClientMetadata client_metadata = 1;
  QsClientId client_id = 2;
  bytes epoch_id = 3;
  uint32 leaf_index = 4;
  uint32 generation = 5;
  repeated KeyPackage key_packages = 6;
  repeated ApqKeyPackage apq_key_packages = 7;
}

message StageKeyPackagesResponse {}

// key package

message KeyPackageRequest {
  common.v1.ClientMetadata client_metadata = 2;
  FriendshipToken sender = 1;
}

message KeyPackageResponse {
  KeyPackage key_package = 1;
}

// publish apq key packages

message PublishApqKeyPackagesRequest {
  PublishApqKeyPackagesPayload payload = 1;
  common.v1.Signature signature = 2;
}

message PublishApqKeyPackagesPayload {
  common.v1.ClientMetadata client_metadata = 1;
  QsClientId client_id = 2;
  repeated ApqKeyPackage apq_key_packages = 3;
}

message ApqKeyPackage {
  // TLS encoded key package for the traditional group.
  bytes t_key_package_tls = 1;
  // TLS encoded key package for the post-quantum group.
  bytes pq_key_package_tls = 2;
}

message PublishApqKeyPackagesResponse {}

// apq key package

message ApqKeyPackageRequest {
  common.v1.ClientMetadata client_metadata = 2;
  FriendshipToken sender = 1;
}

message ApqKeyPackageResponse {
  ApqKeyPackage key_package = 1;
}

// qs encryption key

message QsEncryptionKeyRequest {
  common.v1.ClientMetadata client_metadata = 1;
}

message QsEncryptionKeyResponse {
  ClientIdEncryptionKey encryption_key = 1;
}

message ClientIdEncryptionKey {
  bytes bytes = 1;
}

// listen

message ListenRequest {
  oneof request {
    InitListenRequest init = 1;
    AckListenRequest ack = 2;
    FetchListenRequest fetch = 3;
  }
}

message InitListenRequest {
  common.v1.ClientMetadata client_metadata = 3;
  QsClientId client_id = 1;
  // Sequence number to start listening from (inclusive)
  uint64 sequence_number_start = 2;

  InitListenPayload payload = 4;
  common.v1.Signature signature = 5;
}

// WARNING: The signature is verified against the server's prost *re-encoding*
// of this message, not the wire bytes. Therefore, to keep verifying signatures
// from older clients the encoding must be stable: never reorder, renumber, or
// remove fields (adding optional fields is fine).
message InitListenPayload {
  common.v1.ClientMetadata client_metadata = 1;
  QsClientId client_id = 2;
  // Sequence number to start listening from (inclusive)
  uint64 sequence_number_start = 3;
}

message AckListenRequest {
  // Sequence number to acknowledge up to (exclusive)
  uint64 up_to_sequence_number = 2;
}

message FetchListenRequest {}

message ListenResponse {
  oneof event {
    QueueEmpty empty = 1;
    QueueMessage message = 2;
    QueueEventPayload payload = 3;
  }
}

// Event notifying recipients that the queue is empty
message QueueEmpty {}

message QueueMessage {
  uint64 sequence_number = 1;
  common.v1.Ciphertext ciphertext = 2;
}

// Payload sent over a listen stream from one client to other clients that are
// *currently listening*
message QueueEventPayload {
  common.v1.GroupId group_id = 1;
  delivery_service.v1.LeafNodeIndex sender = 2;
  delivery_service.v1.GroupEpoch epoch = 3;
  common.v1.Timestamp timestamp = 4;
  bytes payload = 5;
}
